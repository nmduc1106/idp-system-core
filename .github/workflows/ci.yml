name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Job 1: Golang API Gateway — Build & Vet
  # ============================================
  golang:
    name: Go Build & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api-gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet (static analysis)
        run: go vet ./...

  # ============================================
  # Job 2: Python OCR Worker — Lint & Validate
  # ============================================
  python:
    name: Python Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: ocr-worker/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on everything else (non-blocking, max complexity 10)
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
